services:
  postgres:
    image: postgres:16-alpine
    container_name: pact-postgres
    environment:
      POSTGRES_DB: pact
      POSTGRES_USER: pact
      POSTGRES_PASSWORD: pact
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact -d pact"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pact_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pact-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pact_redis_data:/data

volumes:
  pact_postgres_data:
  pact_redis_data:
