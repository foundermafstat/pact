lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      typescript:
        specifier: ^5.9.3
        version: 5.9.3

  apps/api:
    dependencies:
      '@pact/sdk':
        specifier: workspace:*
        version: link:../../packages/sdk
      '@pact/shared':
        specifier: workspace:*
        version: link:../../packages/shared
      '@pact/zk':
        specifier: workspace:*
        version: link:../../packages/zk

  apps/web:
    dependencies:
      '@pact/sdk':
        specifier: workspace:*
        version: link:../../packages/sdk
      '@pact/shared':
        specifier: workspace:*
        version: link:../../packages/shared

  packages/sdk:
    dependencies:
      '@pact/shared':
        specifier: workspace:*
        version: link:../shared

  packages/shared: {}

  packages/zk:
    dependencies:
      '@pact/shared':
        specifier: workspace:*
        version: link:../shared

packages:

  typescript@5.9.3:
    resolution: {integrity: sha512-jl1vZzPDinLr9eUt3J/t7V6FgNEw9QjvBPdysz9KfQDD41fQrC2Y4vKQdiaUpFT4bXlb1RHhLpp8wtm6M5TgSw==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  typescript@5.9.3: {}
